<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAO Stake UI</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<style>
  body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
  input { width: 100%; margin-bottom: 10px; padding: 8px; }
  button { padding: 10px 20px; margin-right: 10px; }
  label { font-weight: bold; }
</style>
</head>
<body>
<h2>TAO Stake UI</h2>

<label>Contract Address</label>
<input id="contract" placeholder="0x..." value="0x0000000000000000000000000000000000000805">

<label>Hotkey (public key, hex)</label>
<input id="hotkey" placeholder="0x...">

<label>Amount (TAO, integer)</label>
<input id="amount" placeholder="1000000000" value="1000000000">

<label>NetUID (Subnet ID)</label>
<input id="netuid" placeholder="e.g., 0" value="0">

<button id="connect">Connect MetaMask</button>
<button id="stake">Add Stake</button>
<button id="unstake">Remove Stake</button>

<script>
let contract, signer;

// Funkcja konwertuje public key na bytes32
function formatHotkey(pubkey) {
  if (!pubkey.startsWith("0x") || pubkey.length !== 66) {
    alert("Hotkey musi być 32 bajty (64 hex) z 0x na początku");
    throw new Error("Invalid hotkey");
  }
  return pubkey;
}

async function connect() {
  if (!window.ethereum) {
    alert("MetaMask not detected!");
    return;
  }
  const provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();

  const contractAddress = document.getElementById("contract").value;
  contract = new ethers.Contract(
    contractAddress,
    [
      "function addStake(bytes32 hotkey, uint256 amount, uint32 netUID)",
      "function removeStake(bytes32 hotkey, uint256 amount, uint32 netUID)"
    ],
    signer
  );
  alert("MetaMask connected ✅");
}

async function addStake() {
  try {
    const hotkey = formatHotkey(document.getElementById("hotkey").value);
    const amount = ethers.BigNumber.from(document.getElementById("amount").value);
    const netuid = parseInt(document.getElementById("netuid").value);

    const tx = await contract.addStake(hotkey, amount, netuid, { gasLimit: 1000000 });
    console.log("TX hash:", tx.hash);
    await tx.wait();
    alert("Stake successful ✅");
  } catch (err) {
    console.error(err);
    alert("Error staking! Sprawdź hotkey i amount.");
  }
}

async function removeStake() {
  try {
    const hotkey = formatHotkey(document.getElementById("hotkey").value);
    const amount = ethers.BigNumber.from(document.getElementById("amount").value);
    const netuid = parseInt(document.getElementById("netuid").value);

    const tx = await contract.removeStake(hotkey, amount, netuid, { gasLimit: 1000000 });
    console.log("TX hash:", tx.hash);
    await tx.wait();
    alert("Unstake successful ✅");
  } catch (err) {
    console.error(err);
    alert("Error unstaking! Sprawdź hotkey i amount.");
  }
}

document.getElementById("connect").onclick = connect;
document.getElementById("stake").onclick = addStake;
document.getElementById("unstake").onclick = removeStake;
</script>
</body>
</html>
