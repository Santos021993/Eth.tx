<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAO Stake UI</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<style>
  body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
  input { width: 100%; margin-bottom: 10px; padding: 8px; }
  button { padding: 10px 20px; margin-right: 10px; margin-top: 10px; }
  label { font-weight: bold; }
</style>
</head>
<body>
<h2>TAO Stake UI</h2>

<label>Contract Address</label>
<input id="contract" placeholder="0x..." value="0x0000000000000000000000000000000000000805">

<label>Hotkey (bytes32)</label>
<input id="hotkey" placeholder="0x...">

<label>Amount (RAO)</label>
<input id="amount" placeholder="10000000">

<label>NetUID (Subnet ID)</label>
<input id="netuid" placeholder="e.g., 0">

<button id="connect">Connect MetaMask</button>
<button id="stake">Add Stake</button>
<button id="unstake">Remove Stake</button>

<script>
let contract, signer;

async function connect() {
  if (!window.ethereum) {
    alert("MetaMask not detected!");
    return;
  }
  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();

    const contractAddress = document.getElementById("contract").value;
    contract = new ethers.Contract(
      contractAddress,
      [
        "function addStake(bytes32 hotkey, uint256 amount, uint32 netUID)",
        "function removeStake(bytes32 hotkey, uint256 amount, uint32 netUID)"
      ],
      signer
    );
    alert("MetaMask connected ✅");
  } catch (err) {
    console.error(err);
    alert("Error connecting MetaMask!");
  }
}

function validateInputs(hotkey, amount, netuid) {
  if (!hotkey || !amount || netuid === "") {
    alert("Fill all fields!");
    return false;
  }
  if (!/^0x[0-9a-fA-F]{64}$/.test(hotkey)) {
    alert("Hotkey must be a valid 32-byte hex string (0x + 64 hex chars)");
    return false;
  }
  if (isNaN(amount) || BigInt(amount) <= 0n) {
    alert("Amount must be a positive number");
    return false;
  }
  if (isNaN(netuid) || parseInt(netuid) < 0) {
    alert("NetUID must be a non-negative integer");
    return false;
  }
  return true;
}

async function addStake() {
  const hotkey = document.getElementById("hotkey").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const netuid = document.getElementById("netuid").value.trim();

  if (!validateInputs(hotkey, amount, netuid)) return;

  try {
    const hotkeyBytes = ethers.hexlify(ethers.getBytes(hotkey));
    const amountBN = BigInt(amount);
    const netuidInt = parseInt(netuid);

    const tx = await contract.addStake(hotkeyBytes, amountBN, netuidInt, { gasLimit: 1000000 });
    console.log("TX:", tx.hash);
    await tx.wait();
    alert("Stake successful ✅");
  } catch (err) {
    console.error(err);
    alert("Error staking! " + (err?.data?.message || err.message));
  }
}

async function removeStake() {
  const hotkey = document.getElementById("hotkey").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const netuid = document.getElementById("netuid").value.trim();

  if (!validateInputs(hotkey, amount, netuid)) return;

  try {
    const hotkeyBytes = ethers.hexlify(ethers.getBytes(hotkey));
    const amountBN = BigInt(amount);
    const netuidInt = parseInt(netuid);

    const tx = await contract.removeStake(hotkeyBytes, amountBN, netuidInt, { gasLimit: 1000000 });
    console.log("TX:", tx.hash);
    await tx.wait();
    alert("Unstake successful ✅");
  } catch (err) {
    console.error(err);
    alert("Error unstaking! " + (err?.data?.message || err.message));
  }
}

document.getElementById("connect").onclick = connect;
document.getElementById("stake").onclick = addStake;
document.getElementById("unstake").onclick = removeStake;
</script>
</body>
</html>
