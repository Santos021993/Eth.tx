<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAO Stake UI</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    padding: 30px 20px;
    max-width: 560px;
    margin: auto;
  }
  h2 { color: #58a6ff; margin-bottom: 6px; }
  .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: bold;
    color: #8b949e;
    margin-bottom: 4px;
    margin-top: 14px;
  }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #58a6ff; }
  .buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  button {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  #connect       { background: #238636; color: white; }
  #stake         { background: #1f6feb; color: white; }
  #stakeLimit    { background: #0d4a8a; color: white; border: 1px solid #1f6feb; }
  #unstake       { background: #b62324; color: white; }
  #unstakeFull   { background: #6e2c2c; color: white; }
  #status {
    margin-top: 18px;
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
    word-break: break-all;
    white-space: pre-wrap;
  }
  #status.ok   { background: #0f2d1a; border: 1px solid #238636; color: #3fb950; }
  #status.err  { background: #2d0f0f; border: 1px solid #b62324; color: #f85149; }
  #status.info { background: #0d1f33; border: 1px solid #1f6feb; color: #58a6ff; }
  .note { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .divider { border: none; border-top: 1px solid #21262d; margin: 22px 0 8px; }
  .section-label {
    font-size: 11px;
    color: #6e7681;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .limit-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    margin-top: 14px;
  }
  .limit-box label { margin-top: 8px; }
  .limit-box label:first-child { margin-top: 0; }
</style>
</head>
<body>
<h2>⚡ TAO Stake UI</h2>
<div class="subtitle">Bittensor EVM Staking Precompile V2 — 0x...0805</div>

<label>Contract Address</label>
<input type="text" id="contract" value="0x0000000000000000000000000000000000000805">

<label>Hotkey (bytes32 — public key hex)</label>
<input type="text" id="hotkey" placeholder="0x56a9aee6291bd03ab6d36d4d13e2bebae7cd403518066c72fba1b417d6ddd748">
<div class="note">Konwertuj SS58 → public key hex na ss58.org</div>

<label>Amount (RAO)</label>
<input type="text" id="amount" placeholder="1000000000">
<div class="note">1 TAO = 1 000 000 000 RAO &nbsp;|&nbsp; 0.01 TAO = 10 000 000 RAO</div>

<label>NetUID (Subnet ID)</label>
<input type="text" id="netuid" placeholder="0" value="0">

<div class="buttons">
  <button id="connect">🔌 Connect MetaMask</button>
</div>

<hr class="divider">
<div class="section-label">Akcje</div>
<div class="buttons">
  <button id="stake">➕ Add Stake</button>
  <button id="unstake">➖ Remove Stake</button>
  <button id="unstakeFull">🗑️ Remove Stake FULL</button>
</div>

<hr class="divider">
<div class="section-label">Add Stake z limitem ceny</div>
<div class="limit-box">
  <label>Limit Price (RAO za 1 alpha token)</label>
  <input type="text" id="limitPrice" placeholder="np. 2000000 = cena 0.002 TAO">
  <div class="note">Cena z wykresu × 1 000 000 000 — np. 0.002 → wpisujesz 2000000</div>
  <div class="buttons" style="margin-top: 14px;">
    <button id="stakeLimit">➕ Add Stake Limit</button>
  </div>
</div>

<div id="status"></div>

<script>
let contract = null;
let signer = null;

const ABI = [
  {
    "inputs": [
      {"internalType": "bytes32", "name": "hotkey",  "type": "bytes32"},
      {"internalType": "uint256", "name": "amount",  "type": "uint256"},
      {"internalType": "uint256", "name": "netuid",  "type": "uint256"}
    ],
    "name": "addStake",
    "outputs": [],
    "stateMutability": "payable",
    "type": "function"
  },
  {
    "inputs": [
      {"internalType": "bytes32", "name": "hotkey",        "type": "bytes32"},
      {"internalType": "uint256", "name": "amount",        "type": "uint256"},
      {"internalType": "uint256", "name": "limit_price",   "type": "uint256"},
      {"internalType": "bool",    "name": "allow_partial", "type": "bool"},
      {"internalType": "uint256", "name": "netuid",        "type": "uint256"}
    ],
    "name": "addStakeLimit",
    "outputs": [],
    "stateMutability": "payable",
    "type": "function"
  },
  {
    "inputs": [
      {"internalType": "bytes32", "name": "hotkey", "type": "bytes32"},
      {"internalType": "uint256", "name": "amount", "type": "uint256"},
      {"internalType": "uint256", "name": "netuid", "type": "uint256"}
    ],
    "name": "removeStake",
    "outputs": [],
    "stateMutability": "payable",
    "type": "function"
  },
  {
    "inputs": [
      {"internalType": "bytes32", "name": "hotkey", "type": "bytes32"},
      {"internalType": "uint256", "name": "netuid", "type": "uint256"}
    ],
    "name": "removeStakeFull",
    "outputs": [],
    "stateMutability": "payable",
    "type": "function"
  }
];

function showStatus(msg, type = "info") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type;
  el.style.display = "block";
}

function validateHotkey(hotkey) {
  return /^0x[0-9a-fA-F]{64}$/.test(hotkey);
}

function getCommonInputs() {
  const hotkey = document.getElementById("hotkey").value.trim();
  const netuidRaw = document.getElementById("netuid").value.trim();
  if (!validateHotkey(hotkey)) {
    showStatus("❌ Hotkey musi być: 0x + 64 znaki hex.\nSkonwertuj SS58 na ss58.org", "err");
    return null;
  }
  let netuid;
  try {
    netuid = BigInt(netuidRaw);
    if (netuid < 0n) throw new Error();
  } catch {
    showStatus("❌ NetUID musi być nieujemną liczbą całkowitą np. 0", "err");
    return null;
  }
  return { hotkey, netuid };
}

function getAmount() {
  const amountRaw = document.getElementById("amount").value.trim();
  try {
    const amount = BigInt(amountRaw);
    if (amount <= 0n) throw new Error();
    return amount;
  } catch {
    showStatus("❌ Amount musi być liczbą całkowitą np. 1000000000", "err");
    return null;
  }
}

async function sendTx(txPromise, label) {
  try {
    showStatus("⏳ " + label + "... Zatwierdź w MetaMask.", "info");
    const tx = await txPromise;
    showStatus("⏳ TX wysłany!\nHash: " + tx.hash + "\n\nCzekam na potwierdzenie...", "info");
    console.log("TX hash:", tx.hash);
    const receipt = await tx.wait();
    showStatus(
      "✅ " + label + " — sukces!\nTX: " + tx.hash + "\nBlok: " + receipt.blockNumber,
      "ok"
    );
  } catch (err) {
    console.error("FULL ERROR:", JSON.stringify(err, null, 2));
    const msg = err?.info?.error?.message
              || err?.data?.message
              || err?.shortMessage
              || err?.reason
              || err?.message
              || "Nieznany błąd";
    showStatus("❌ Błąd: " + msg + "\n\n(Pełny błąd w F12 → Console)", "err");
  }
}

async function connect() {
  if (!window.ethereum) { showStatus("❌ MetaMask nie wykryty!", "err"); return; }
  try {
    showStatus("Łączenie z MetaMask...", "info");
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    const addr = document.getElementById("contract").value.trim();
    contract = new ethers.Contract(addr, ABI, signer);
    const userAddr = await signer.getAddress();
    const network = await provider.getNetwork();
    const chainOk = network.chainId.toString() === "964";
    showStatus(
      "✅ Połączono: " + userAddr +
      "\nSieć: Chain ID " + network.chainId.toString() +
      (chainOk ? " ✅" : "\n⚠️ Uwaga: oczekiwano Chain ID 964 (Bittensor)!"),
      "ok"
    );
  } catch (err) {
    console.error(err);
    showStatus("❌ Błąd połączenia: " + err.message, "err");
  }
}

async function addStake() {
  if (!contract) { showStatus("❌ Najpierw połącz MetaMask!", "err"); return; }
  const c = getCommonInputs(); if (!c) return;
  const amount = getAmount(); if (amount === null) return;
  await sendTx(contract.addStake(c.hotkey, amount, c.netuid), "Add Stake");
}

async function addStakeLimit() {
  if (!contract) { showStatus("❌ Najpierw połącz MetaMask!", "err"); return; }
  const c = getCommonInputs(); if (!c) return;
  const amount = getAmount(); if (amount === null) return;
  const limitRaw = document.getElementById("limitPrice").value.trim();
  let limitPrice;
  try {
    limitPrice = BigInt(limitRaw);
    if (limitPrice <= 0n) throw new Error();
  } catch {
    showStatus("❌ Limit Price musi być liczbą całkowitą np. 2000000", "err");
    return;
  }
  // allow_partial zawsze false
  await sendTx(
    contract.addStakeLimit(c.hotkey, amount, limitPrice, false, c.netuid),
    "Add Stake Limit"
  );
}

async function removeStake() {
  if (!contract) { showStatus("❌ Najpierw połącz MetaMask!", "err"); return; }
  const c = getCommonInputs(); if (!c) return;
  const amount = getAmount(); if (amount === null) return;
  await sendTx(contract.removeStake(c.hotkey, amount, c.netuid), "Remove Stake");
}

async function removeStakeFull() {
  if (!contract) { showStatus("❌ Najpierw połącz MetaMask!", "err"); return; }
  const c = getCommonInputs(); if (!c) return;
  await sendTx(contract.removeStakeFull(c.hotkey, c.netuid), "Remove Stake FULL");
}

document.getElementById("connect").onclick     = connect;
document.getElementById("stake").onclick       = addStake;
document.getElementById("stakeLimit").onclick  = addStakeLimit;
document.getElementById("unstake").onclick     = removeStake;
document.getElementById("unstakeFull").onclick = removeStakeFull;
</script>
</body>
</html>
